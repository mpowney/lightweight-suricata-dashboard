server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: suricata
    static_configs:
      - targets: ['localhost']
        labels:
          job: suricata
          __path__: /var/log/suricata/eve.json
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event_type: event_type
            src_ip: src_ip
            dest_ip: dest_ip
      - geoip:
          db: /etc/promtail/geoip/GeoLite2-City.mmdb
          db_type: city
          source: src_ip
      - labels:
          event_type:
          src_country: geoip_country_name
          src_latitude: geoip_location_latitude
          src_longitude: geoip_location_longitude
      - geoip:
          db: /etc/promtail/geoip/GeoLite2-City.mmdb
          db_type: city
          source: dest_ip
      - labels:
          dest_country: geoip_country_name
          geoip_location_latitude:
          geoip_location_longitude:
          dest_latitude: geoip_location_latitude
          dest_longitude: geoip_location_longitude
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.999999-0700'
